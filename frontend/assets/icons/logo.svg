<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 145">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#29b6f6"/>
      <stop offset="55%"  stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
    <linearGradient id="gs" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0d4a7a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#005060" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="drop">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0070a8" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Shadow layer -->
  <text x="203" y="101" text-anchor="end"
    font-family="'Arial Black','Arial','Helvetica Neue',sans-serif"
    font-weight="900" font-size="92" fill="url(#gs)">CL</text>
  <text x="218" y="101" text-anchor="start"
    font-family="'Arial Black','Arial','Helvetica Neue',sans-serif"
    font-weight="900" font-size="92" fill="url(#gs)">USY</text>

  <!-- "CL" -->
  <text x="200" y="97" text-anchor="end"
    font-family="'Arial Black','Arial','Helvetica Neue',sans-serif"
    font-weight="900" font-size="92" fill="url(#g)" filter="url(#drop)">CL</text>

  <!-- O = circle ring + play button (centered at x=205, y=52) -->
  <circle cx="205" cy="51" r="35" fill="none" stroke="url(#g)" stroke-width="7" filter="url(#drop)"/>
  <!-- Play triangle: slightly right of center -->
  <polygon points="195,37 195,65 222,51" fill="url(#g)"/>

  <!-- "USY" -->
  <text x="215" y="97" text-anchor="start"
    font-family="'Arial Black','Arial','Helvetica Neue',sans-serif"
    font-weight="900" font-size="92" fill="url(#g)" filter="url(#drop)">USY</text>

  <!-- CRM subtitle -->
  <text x="200" y="128"
    font-family="'Arial Black','Arial','Helvetica Neue',sans-serif"
    font-weight="900" font-size="25" fill="#00bcd4" letter-spacing="12" text-anchor="middle">CRM</text>
</svg>
